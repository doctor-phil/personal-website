# Site parameters consumed by the custom theme.

# Short description used for SEO / social cards.
description: 'PhD Economist, Applied Scientist'

# The author profile (folder under content/authors/) to use for the homepage bio.
profile_author: frontpage

# Sections (content folders) merged into the homepage research feed and the
# /research aggregator page, in display priority order.
researchSections:
  - publications
  - workingpapers
  - wps

# Number of feed cards shown before the "endless scroll" reveals more.
feed_initial_batch: 6
feed_batch_size: 4

# Social card / SEO.
marketing:
  twitter: 'pc_solimine'
  theme_color: '#1565c0'

# Footer.
copyright: 'Philip Solimine'

# Optional analytics (GA4). Leave empty to disable. The old UA-137696306-1
# property was Universal Analytics, which Google shut down (deprecated); replaced with GA4.
google_analytics: 'G-MP09LF34JY'
