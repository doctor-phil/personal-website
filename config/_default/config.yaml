# Hugo configuration
# Custom lightweight theme (Wowchemy removed). Docs: https://gohugo.io/

title: Philip Solimine
baseURL: 'https://www.psolimine.net/'
locale: en-us

############################
## LANGUAGE
############################

defaultContentLanguage: en
hasCJKLanguage: false
removePathAccents: true

############################
## CONTENT / BEHAVIOUR
############################

enableEmoji: true
enableRobotsTXT: true
summaryLength: 60
enableGitInfo: false

pagination:
  pagerSize: 12

# Files Hugo should ignore when building.
ignoreFiles: ['\.ipynb$', '.ipynb_checkpoints$', '\.Rmd$', '\.Rmarkdown$', '_cache$']

# Pretty URLs for talks/taxonomies (preserves legacy paths).
permalinks:
  event: '/talk/:slug/'
  tags: '/tag/:slug/'
  categories: '/category/:slug/'
  publication_types: '/publication-type/:slug/'

disableAliases: true

taxonomies:
  tag: tags
  category: categories
  publication_type: publication_types

outputs:
  home: [HTML, RSS]
  section: [HTML, RSS]

imaging:
  resampleFilter: lanczos
  quality: 80
  anchor: smart

markup:
  goldmark:
    renderer:
      # Content uses raw HTML (details/summary, iframe, br, li/ul) — must allow it.
      unsafe: true
    extensions:
      typographer:
        disable: true
  highlight:
    style: github
    noClasses: false
    lineNos: false
  tableOfContents:
    startLevel: 2
    endLevel: 3

sitemap:
  changefreq: monthly
  priority: 0.5
