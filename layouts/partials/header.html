<nav class="navbar" id="navbar-main">
  <div class="container">
    <a class="navbar-brand" href="{{ "/" | relURL }}">{{ site.Title }}</a>
    <button class="nav-toggle" aria-label="Toggle navigation" aria-controls="nav-links" aria-expanded="false">
      <i class="fas fa-bars"></i>
    </button>
    <ul class="nav-links" id="nav-links">
      {{- range site.Menus.main }}
        {{- $url := .URL -}}
        {{- $active := and (ne $url "/") (hasPrefix $.RelPermalink (printf "/%s" (trim $url "/"))) -}}
        {{- if eq $url "/" }}{{ $active = $.IsHome }}{{ end -}}
        <li>
          <a href="{{ $url | relLangURL }}"{{ if $active }} class="active"{{ end }}>{{ .Name }}</a>
        </li>
      {{- end }}
    </ul>
  </div>
</nav>
