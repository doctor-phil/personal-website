<!doctype html>
<html lang="{{ site.Language.Lang | default "en" }}">
<head>
  {{ partial "head.html" . }}
</head>
<body id="top">
  {{ partial "header.html" . }}
  <main id="content">
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
  {{- $js := resources.Get "js/main.js" | minify | fingerprint -}}
  <script src="{{ $js.RelPermalink }}" integrity="{{ $js.Data.Integrity }}" defer></script>
</body>
</html>
